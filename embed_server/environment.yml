name: mcp-embed
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  - pip:
      - fastapi[standard]>=0.115.0
      - uvicorn>=0.30.6
      - pydantic>=2.9.2
      - python-dotenv>=1.2.1
      - requests>=2.31.0
      - numpy>=1.24.0
      - transformers>=4.40.0
      - optimum[onnxruntime]>=1.21.0
      - overrides>=7.7.0
      # onnxruntime variant установит install.sh:
      #   CPU:    onnxruntime
      #   NVIDIA: onnxruntime-gpu
      #   AMD:    onnxruntime-rocm
